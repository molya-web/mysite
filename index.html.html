<!DOCTYPE html>
<html>
<head>
    <title>Лучший сайт</title>
    <style>
        body {
            transition: background-color 0.5s;
        }
    </style>
</head>
<body>
    <h1>Артур лох объелся блох</h1>
    <p>Это лучший сайт в твоей жизни! Это ты</p>
    <img id="myImage" src="https://i.pinimg.com/474x/6a/45/bc/6a45bc80c6024a85edcd6dc04d92e7fb.jpg?nii=t" alt="Смотри это ты" style="width: 300px; border-radius: 10px;">

    <button id="myButton">Клик</button>
    <p id="message">Лю тя</p>

    <button id="colorButton">лгбт туса</button>
    <button id="resetButton">убрать педиков</button>

    <script>
        // Кнопка "Мае солнышко"
        const button = document.getElementById('myButton');
        const message = document.getElementById('message');

        button.addEventListener('click', () => {
            message.textContent = 'Мае солнышко';
        });

        // Кнопка смены цвета
        const colorButton = document.getElementById('colorButton');
        const resetButton = document.getElementById('resetButton');

        colorButton.addEventListener('click', () => {
            const colors = ['#ffcccc', '#ccffcc', '#ccccff', '#ffffcc', '#ffccff', '#ccffff'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.style.backgroundColor = randomColor;
        });

        resetButton.addEventListener('click', () => {
            document.body.style.backgroundColor = '';
        });
    </script>
</body>
</html>
